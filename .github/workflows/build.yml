name: Build APK de AELIAN CHRONOS
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Flet
        run: pip install flet
      - name: Build APK
        run: flet build apk
      - name: Upload Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Aelian-Chronos-APK
          path: build/apk/*.apk